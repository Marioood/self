<!DOCTYPE html>
<html>
  <body>
    <canvas id="render" style="width: 512px; height: 512px; image-rendering: pixelated"></canvas>
    <p>Broken cellular automaton.</p>
  </body>
  <script src="render-helper.js"></script>
  <script>
    const WIDTH = 32;
    const HEIGHT = 32;
    const LENGTH = WIDTH * HEIGHT;

    const canvas = document.getElementById("render");
    const ctx = canvas.getContext("2d");
    const idata = ctx.getImageData(0, 0, WIDTH, HEIGHT);
    const pixels = idata.data;

    let t = 0;

    function initialize(delay) {
      canvas.width = WIDTH;
      canvas.height = HEIGHT;
      
      let handle = window.setInterval(
        () => {
          render();
          t++;
          ctx.putImageData(idata, 0, 0);
        }, delay
      );
    }

    ctx.putImageData(idata, 0, 0);

    function plot(x, y, r, g, b, a) {
      const i = (x + y * WIDTH) * 4;
      pixels[i]   = r;
      pixels[i+1] = g;
      pixels[i+2] = b;
      pixels[i+3] = a;
    }
    /******** V user stuff here V ********/
    let cells = Array(LENGTH);
    for(let i = 0; i < LENGTH; i++) {
      cells[i] = Math.random();
    }
    let cellsOld = Array(LENGTH);

    function render() {
      for(let i = 0; i < LENGTH; i++) cellsOld[i] = cells[i];
      
      for(let y = 0; y < HEIGHT; y++) {
        for(let x = 0; x < WIDTH; x++) {
          const i = x + y * WIDTH;
          
          let n = 0;
          n += getCell(x + 1, y    );
          n += getCell(x    , y + 1);
          n += getCell(x - 1, y    );
          n += getCell(x    , y - 1);
          n += getCell(x + 1, y - 1);
          n += getCell(x - 1, y + 1);
          n += getCell(x + 1, y + 1);
          n += getCell(x - 1, y - 1);
          
          if(n < 4) {
            cells[i] = n / 7;
          } else if(n > 4) {
            cells[i] = 0.5;
          } else {
            cells[i] = 0;
          }
          
          /*if(cellsOld[i] == 1) {
            if(n < 2) {
              cells[i] = 0;
            } else if(n == 2 || n == 3) {
              cells[i] = 1;
            } else if(n > 3) {
              cells[i] = 0;
            }
          } else {
            if(n == 3) {
              cells[i] = 1;
            }
          }*/
          
          col = cellsOld[i] * 255;
          plot(x, y, col, col, col, 255);
        }
      }
    }
    function getCell(x, y) {
      return cellsOld[mod(x, WIDTH) + mod(y, HEIGHT) * WIDTH];
    }
    //5 fps
    initialize(1000 / 5);
  </script>
</html>
