<!DOCTYPE html>
<html>
  <body>
    <canvas id="render" style="width: 512px; height: 512px; image-rendering: pixelated; background-color: black"></canvas>
    <p>Perlin noise.</p>
    <p id="render-time"></p>
  </body>
  <script src="render-helper.js"></script>
  <script>
    const WIDTH = 128;
    const HEIGHT = 128;
    const LENGTH = WIDTH * HEIGHT;

    const canvas = document.getElementById("render");
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    const ctx = canvas.getContext("2d");
    const idata = ctx.getImageData(0, 0, WIDTH, HEIGHT);
    const pixels = idata.data;

    let t = 0;

    function initialize(delay) {
      let handle = window.setInterval(
        () => {
          let renderTimeStart = Date.now();
          render();
          const renderTime = Date.now() - renderTimeStart;
          document.getElementById("render-time").innerText = renderTime;
          t++;
          ctx.putImageData(idata, 0, 0);
        }, delay
      );
    }

    ctx.putImageData(idata, 0, 0);

    function plot(x, y, r, g, b, a) {
      const i = (x + y * WIDTH) * 4;
      pixels[i]   = r;
      pixels[i+1] = g;
      pixels[i+2] = b;
      pixels[i+3] = a;
    }
    const getRed = (x, y) => pixels[(x + y * WIDTH) * 4];
    const getGreen = (x, y) => pixels[(x + y * WIDTH) * 4+1];
    const getBlue = (x, y) => pixels[(x + y * WIDTH) * 4+2];
    /******** V user stuff here V ********/
    function vec2(x, y) {
      return {x: x, y: y};
    }
    
    function vec2polar(r, theta) {
      return {x: Math.sin(theta) * r, y: Math.cos(theta) * r};
    }
    
    function dotProduct(a, b) {
      return a.x * b.x + a.y * b.y;
    }
    
    function vec2lerp(a, b, bias) {
      return vec2(lerp(a.x, b.x, bias), lerp(a.y, b.y, bias));
    }
    
    const dirTable = Array(256);
    
    for(let i = 0; i < dirTable.length; i++) {
      dirTable[i] = Math.random() * Math.PI * 2;
    }
    
    const mulTable = Array(64);
    
    for(let i = 0; i < mulTable.length; i++) {
      mulTable[i] = (Math.random() * 2 - 1) * 0.25;
    }
    
    function getAng(x, y) {
      const theta = dirTable[Math.abs(x + y * 69) % 256];
      const timeMul = mulTable[Math.abs(x + y * 69) % 64];
      return theta + t * timeMul;
    }
    
    function perlin(x, y) {
      const xN = x - Math.floor(x);
      const yN = y - Math.floor(y);
      const xNHi = x - Math.ceil(x);
      const yNHi = y - Math.ceil(y);
      
      const xGridLo = Math.floor(x);
      const yGridLo = Math.floor(y);
      const xGridHi = Math.ceil(x);
      const yGridHi = Math.ceil(y);
      
      const ang00 = getAng(xGridLo, yGridLo);
      const ang10 = getAng(xGridHi, yGridLo);
      const ang01 = getAng(xGridLo, yGridHi);
      const ang11 = getAng(xGridHi, yGridHi);
      
      const dot00 = xN * Math.sin(ang00) + yN * Math.cos(ang00);
      const dot10 = xNHi * Math.sin(ang10) + yN * Math.cos(ang10);
      const dot01 = xN * Math.sin(ang01) + yNHi * Math.cos(ang01);
      const dot11 = xNHi * Math.sin(ang11) + yNHi * Math.cos(ang11);
      
      const xBias = smoothstep(xN);
      const yBias = smoothstep(yN);
      
      return lerp(lerp(dot00, dot10, xBias), lerp(dot01, dot11, xBias), yBias);
    }
    
    function perlinOctaves(x, y, octaves) {
      let n = 0;
      let scale = 1;
      for(let o = 0; o < octaves; o++) {
        n += perlin(x / scale, y / scale) * scale;
        scale /= 2;
      }
      return n;
    }
    
    const offsets = Array(LENGTH);

    for(let i = 0; i < LENGTH; i++) {
      offsets[i] = Math.floor(Math.random() * 3) - 1;
    }
    
    const highlights = Array(LENGTH).fill(false);
    
    const stones = Array(LENGTH * 3);
    
    for(let y = 0; y < HEIGHT; y++) {
      for(let x = 0; x < WIDTH; x++) {
        const i = (x + y * WIDTH) * 3;
        const grad = perlin(x / 5, y / 5);
        const gradShifted = perlin((x - 1) / 5, (y - 1) / 5);
        let col = Math.cos(((grad - gradShifted) + 0.5) * Math.PI * 3) / 4 + 0.75;
        col += (Math.random() - 0.5) / 2;
        const r = col * 255;
        const g = col * col * 127;
        const b = 0;
        stones[i] = r;
        stones[i+1] = g;
        stones[i+2] = b;
      }
    }

    function render() {
      for(let yi = 0; yi < HEIGHT; yi++) {
        for(let xi = 0; xi < WIDTH; xi++) {
          const grad = perlinOctaves(xi / 16, yi / 16, 2);
          const gradShifted = perlinOctaves((xi - 1) / 16, (yi - 1) / 16, 2);
          const col = ((grad - gradShifted) + 0.5);
          const r = col * 127 + 7;
          const g = col * col * 255;
          const b = col * 182 + 127;
          plot(xi, yi, r, g, b, 255);
        }
      }
      
      for(let y = 0; y < HEIGHT; y++) {
        for(let x = 0; x < WIDTH; x++) {
          const i = (x + y * WIDTH) * 4;
          const oldR = pixels[i];
          const oldG = pixels[i+1];
          const oldB = pixels[i+2];
          const xOffs = offsets[x + y * WIDTH];
          const iOffs = (mod(x + xOffs, WIDTH) + y * WIDTH) * 4;
          plot(x, y, pixels[iOffs], pixels[iOffs+1], pixels[iOffs+2], 255);
          plot(mod(x + xOffs, WIDTH), y, oldR, oldG, oldB, 255);
        }
      }
      
      for(let y = 0; y < HEIGHT; y++) {
        for(let x = 0; x < WIDTH; x++) {
          const baseI = (x + y * WIDTH) * 4;
          const stonesI = (x + y * WIDTH) * 3;
          const oldR = pixels[baseI];
          const oldG = pixels[baseI+1];
          const oldB = pixels[baseI+2];
          const r = lerp(oldR, stones[stonesI], 0.15);
          const g = lerp(oldG, stones[stonesI+1], 0.15);
          const b = lerp(oldB, stones[stonesI+2], 0.15);
          plot(x, y, r, g, b, 255);
        }
      }
      
      for(let y = 0; y < HEIGHT; y++) {
        for(let x = 0; x < WIDTH; x++) {
          const i = x + y * WIDTH;
          const oldR = pixels[i * 4];
          const oldG = pixels[i * 4+1];
          const oldB = pixels[i * 4+2];
          if((oldR + oldG + oldB) / 3 > 147) {
            plot(x, y, 255, 255, 255, 255);
            highlights[i] = true;
          }
        }
      }

      for(let i = 0; i < LENGTH / 8; i++) {
        offsets[Math.floor(Math.random() * LENGTH)] = Math.floor(Math.random() * 3) - 1;
        offsets[Math.floor(Math.random() * LENGTH)] += Math.random() > 0.5 ? -1 : 1;
      }
      
      for(let y = 0; y < HEIGHT; y++) {
        for(let x = 0; x < WIDTH; x++) {
          const i = x + y * WIDTH;
          if(highlights[i]) {
            highlights[i] = false;
            const shineHorzRadius = 3 + (Math.floor(t / 16) % 2);
            const shineVertRadius = 2 + (Math.floor(t / 16) % 2);
            
            for(let i = 1; i <= shineHorzRadius; i++) {
              const iXNeg = (mod(x - i, WIDTH) + y * WIDTH) * 4;
              const iXPos = ((x + i) % WIDTH + y * WIDTH) * 4;
              const iYNeg = (x + mod(y - i, HEIGHT) * WIDTH) * 4;
              const iYPos = (x + (y + i) % HEIGHT * WIDTH) * 4;
              const a = (1 - (i / (shineHorzRadius + 1))) * 63;
              const rXNeg = pixels[iXNeg] + a;
              const gXNeg = pixels[iXNeg+1] + a;
              const bXNeg = pixels[iXNeg+2] + a;
              const rXPos = pixels[iXPos] + a;
              const gXPos = pixels[iXPos+1] + a;
              const bXPos = pixels[iXPos+2] + a;
              const rYNeg = pixels[iYNeg] + a;
              const gYNeg = pixels[iYNeg+1] + a;
              const bYNeg = pixels[iYNeg+2] + a;
              const rYPos = pixels[iYPos] + a;
              const gYPos = pixels[iYPos+1] + a;
              const bYPos = pixels[iYPos+2] + a;
              plot((x + i) % WIDTH, y, rXPos, gXPos, bXPos, 255);
              plot(mod(x - i, WIDTH), y, rXNeg, gXNeg, bXNeg, 255);
              plot(x, (y + i) % HEIGHT, rYPos, gYPos, bYPos, 255);
              plot(x, mod(y - i, HEIGHT), rYNeg, gYNeg, bYNeg, 255);
            }
          }
        }
      }
      
    }
    //30 fps
    initialize(1000 / 20);
  </script>
</html>
