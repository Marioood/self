<!DOCTYPE html>
<html>
  <body>
    <canvas id="render" style="width: 256px; height: 256px; image-rendering: pixelated; background-color: black"></canvas>
    <p>Perlin noise.</p>
  </body>
  <script src="render-helper.js"></script>
  <script>
    const WIDTH = 64;
    const HEIGHT = 64;
    const LENGTH = WIDTH * HEIGHT;

    const canvas = document.getElementById("render");
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    const ctx = canvas.getContext("2d");
    const idata = ctx.getImageData(0, 0, WIDTH, HEIGHT);
    const pixels = idata.data;

    let t = 0;

    function initialize(delay) {
      let handle = window.setInterval(
        () => {
          render();
          t++;
          ctx.putImageData(idata, 0, 0);
        }, delay
      );
    }

    ctx.putImageData(idata, 0, 0);

    function plot(x, y, r, g, b, a) {
      const i = (x + y * WIDTH) * 4;
      pixels[i]   = r;
      pixels[i+1] = g;
      pixels[i+2] = b;
      pixels[i+3] = a;
    }
    const getRed = (x, y) => pixels[(x + y * WIDTH) * 4];
    const getGreen = (x, y) => pixels[(x + y * WIDTH) * 4+1];
    const getBlue = (x, y) => pixels[(x + y * WIDTH) * 4+2];
    /******** V user stuff here V ********/
    function vec2(x, y) {
      return {x: x, y: y};
    }
    
    function vec2polar(r, theta) {
      return {x: Math.sin(theta) * r, y: Math.cos(theta) * r};
    }
    
    function dotProduct(a, b) {
      return a.x * b.x + a.y * b.y;
    }
    
    function vec2lerp(a, b, bias) {
      return vec2(lerp(a.x, b.x, bias), lerp(a.y, b.y, bias));
    }
    
    const GRID_SIZE = 8;
    /*const DIRS_WIDTH = Math.floor(WIDTH / GRID_SIZE);
    const DIRS_HEIGHT = Math.floor(HEIGHT / GRID_SIZE);
    const DIRS_LENGTH = DIRS_WIDTH * Math.floor(HEIGHT / GRID_SIZE);
    const dirs = Array(DIRS_LENGTH);
    
    for(let i = 0; i < dirs.length; i++) {
      dirs[i] = vec2polar(1, Math.random() * Math.PI);
    }*/
    
    const dirTable = Array(256);
    
    for(let i = 0; i < dirTable.length; i++) {
      dirTable[i] = Math.random() * Math.PI * 2;
    }
    
    const mulTable = Array(64);
    
    for(let i = 0; i < mulTable.length; i++) {
      mulTable[i] = (Math.random() * 2 - 1) * 0.25;
    }
    
    function getDir(x, y) {
      /*const r = Math.floor(randFromTable(x + y * 69) * 4);
      if(r == 0) {
        return vec2(-1, -1);
      } else if(r == 1) {
        return vec2(-1, 1);
      } else if(r == 2) {
        return vec2(1, -1);
      } else {
        return vec2(1, 1);
      }*/
      const theta = dirTable[Math.abs(x + y * 69) % 256];
      const timeMul = mulTable[Math.abs(x + y * 69) % 64];
      return vec2polar(1, theta + t * timeMul);
    }
    
    function perlin(x, y) {
      //TODO: opimize to use less memory allocation
      const xN = x - Math.floor(x);
      const yN = y - Math.floor(y);
      const xNHi = x - Math.ceil(x);
      const yNHi = y - Math.ceil(y);
      
      const corner00 = vec2(xN, yN);
      const corner10 = vec2(xNHi, yN);
      const corner01 = vec2(xN, yNHi);
      const corner11 = vec2(xNHi, yNHi);
      
      const xGridLo = Math.floor(x);
      const yGridLo = Math.floor(y);
      const xGridHi = Math.ceil(x);
      const yGridHi = Math.ceil(y);
      
      const dot00 = dotProduct(corner00, getDir(xGridLo, yGridLo));
      const dot10 = dotProduct(corner10, getDir(xGridHi, yGridLo));
      const dot01 = dotProduct(corner01, getDir(xGridLo, yGridHi));
      const dot11 = dotProduct(corner11, getDir(xGridHi, yGridHi));
      
      const xBias = easeCos(xN);
      const yBias = easeCos(yN);
      
      return lerp(lerp(dot00, dot10, xBias), lerp(dot01, dot11, xBias), yBias);
    }
    
    const offsets = Array(LENGTH);

    for(let i = 0; i < LENGTH; i++) {
      offsets[i] = Math.floor(Math.random() * 3) - 1;
    }

    function render() {
      for(let yi = 0; yi < HEIGHT; yi++) {
        for(let xi = 0; xi < WIDTH; xi++) {
          const grad = perlin(xi / GRID_SIZE, yi / GRID_SIZE);
          const gradShifted = perlin((xi - 1) / GRID_SIZE, (yi - 1) / GRID_SIZE);
          const col = (grad - gradShifted + 0.5) * 255;
          const r = col * 0.25;
          const g = col;
          const b = col * 0.25 + 63;
          /*if(grad - gradShifted > 0.25) {
            //plot(xi, yi, 255, 255, 255, 255);
            //TODO: move to separate loop and store in separate array
            plot((xi + 1) % WIDTH, yi, 255, 0, 0, 255);
            plot(mod(xi - 1, WIDTH), yi, 255, 0, 0, 255);
            plot(xi, (yi + 1) % HEIGHT, 255, 0, 0, 255);
            plot(xi, mod(yi - 1, HEIGHT), 255, 0, 0, 255);
            
          } else {*/
            plot(xi, yi, r, g, b, 255);
          //}
        }
      }
      
      for(let y = 0; y < HEIGHT; y++) {
        for(let x = 0; x < WIDTH; x++) {
          const i = (x + y * WIDTH) * 4;
          const oldR = pixels[i];
          const oldG = pixels[i+1];
          const oldB = pixels[i+2];
          const xOffs = offsets[x + y * WIDTH];
          const iOffs = (mod(x + xOffs, WIDTH) + y * WIDTH) * 4;
          plot(x, y, pixels[iOffs], pixels[iOffs+1], pixels[iOffs+2], 255);
          plot(mod(x + xOffs, WIDTH), y, oldR, oldG, oldB, 255);
        }
      }

      for(let i = 0; i < LENGTH / 4; i++) {
        //offsets[Math.floor(Math.random() * LENGTH)] = 0;
        offsets[Math.floor(Math.random() * LENGTH)] = Math.floor(Math.random() * 3) - 1;
        offsets[Math.floor(Math.random() * LENGTH)] += Math.random() > 0.5 ? -1 : 1;
      }
  
    }
    //30 fps
    initialize(1000 / 15);
  </script>
</html>
