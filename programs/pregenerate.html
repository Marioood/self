<!DOCTYPE html>
<html>
  <body>
    <canvas id="render" style="width: 768px; height: 768px; image-rendering: pixelated; background-color: black"></canvas>
  </body>
  <script src="render-helper.js"></script>
  <script>
    const WIDTH = 243;
    const HEIGHT = 243;
    const LENGTH = WIDTH * HEIGHT;

    const canvas = document.getElementById("render");
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    const ctx = canvas.getContext("2d");
    const idata = ctx.getImageData(0, 0, WIDTH, HEIGHT);
    const pixels = idata.data;

    let t = 0;

    function initialize(delay) {
      let handle = window.setInterval(
        () => {
          render();
          t++;
          ctx.putImageData(idata, 0, 0);
        }, delay
      );
    }

    ctx.putImageData(idata, 0, 0);

    function plot(x, y, r, g, b, a) {
      const i = (x + y * WIDTH) * 4;
      pixels[i]   = r;
      pixels[i+1] = g;
      pixels[i+2] = b;
      pixels[i+3] = a;
    }
    function plotInt(x, y, color) {
      const i = (x + y * WIDTH) * 4;
      pixels[i]   = (color >> 24) & 255;
      pixels[i+1] = (color >> 16) & 255;
      pixels[i+2] = (color >> 8) & 255;
      pixels[i+3] = color & 255;
    }
    const getRed = (x, y) => pixels[(x + y * WIDTH) * 4];
    const getGreen = (x, y) => pixels[(x + y * WIDTH) * 4+1];
    const getBlue = (x, y) => pixels[(x + y * WIDTH) * 4+2];
    /******** V user stuff here V ********/

    function putCutout(xPivot, yPivot, width, height, func, color) {
      for(let y = 0; y < height; y++) {
        for(let x = 0; x < width; x++) {
          if(func(x, y))
            plotInt(x + xPivot, y + yPivot, color);
        }
      }
    }
    
    function putBrightness(xPivot, yPivot, width, height, func) {
      for(let y = 0; y < height; y++) {
        for(let x = 0; x < width; x++) {
          const col = func(x, y);
          plot(x + xPivot, y + yPivot, col, col, col, 255);
        }
      }
    }
      
    function render() {
      /*const frac = (x, y) => (
          (((x % 3) & 1) & ((y % 3) & 1))
          + (((Math.floor(x / 3) % 3) & 1) & ((Math.floor(y / 3) % 3) & 1))
          + (((Math.floor(x / 9) % 3) & 1) & ((Math.floor(y / 9) % 3) & 1))
          + (((Math.floor(x / 27) % 3) & 1) & ((Math.floor(y / 27) % 3) & 1))
          + (((Math.floor(x / 81) % 3) & 1) & ((Math.floor(y / 81) % 3) & 1))
          //+ (Math.floor(x / 3) % 3 == 1 && Math.floor(y / 3) % 3 == 1)
          //+ (Math.floor(x / 9) % 3 == 1 && Math.floor(y / 9) % 3 == 1)
          //+ (Math.floor(x / 27) % 3 == 1 && Math.floor(y / 27) % 3 == 1)
          //+ (Math.floor(x / 81) % 3 == 1 && Math.floor(y / 81) % 3 == 1)
        ) * (255 / 5);*/
      //const frac = (x, y) => (Math.abs(4 - (x - 5) % 9) - 2) * 64;
      /*const frac = (x, y) => (
        Math.max(
          x % 9 > 4 ? 9 - x % 9 - 3 : x % 9 - 2,
          x % 27 > 13 ? 27 - x % 27 - 9 : x % 27 - 8,
          x % 81 > 40 ? 81 - x % 81 - 27 : x % 81 - 26,
          (x % 3 == 1)
        )
        + (Math.floor(x / 9) % 3 == 1 && Math.floor(y / 9) % 3 == 1)
        + (Math.floor(x / 27) % 3 == 1 && Math.floor(y / 27) % 3 == 1)
        + (Math.floor(x / 81) % 3 == 1 && Math.floor(y / 81) % 3 == 1)
      ) * 16;*/
      const frac = (x, y) => (
        Math.max(
          //(x % 3 == 1) && (y % 3 == 1),
          Math.min(x % 3 > 1 ? 3 - x % 3 - 1 : x % 3 - 0, y % 3 > 1 ? 3 - y % 3 - 1 : y % 3 - 0),
          Math.min(x % 9 > 4 ? 9 - x % 9 - 3 : x % 9 - 2, y % 9 > 4 ? 9 - y % 9 - 3 : y % 9 - 2),
          Math.min(x % 27 > 13 ? 27 - x % 27 - 9 : x % 27 - 8, y % 27 > 13 ? 27 - y % 27 - 9 : y % 27 - 8),
          Math.min(x % 81 > 40 ? 81 - x % 81 - 27 : x % 81 - 26, y % 81 > 40 ? 81 - y % 81 - 27 : y % 81 - 26),
          Math.min(x % 243 > 121 ? 243 - x % 243 - 81 : x % 243 - 80, y % 243 > 121 ? 243 - y % 243 - 81 : y % 243 - 80)
        )
      ) * (255 / 40.5); //40.5

      putBrightness(0, 0, 243, 243, frac);
      
      ctx.putImageData(idata, 0, 0);
    }
    render();
  </script>
</html>
